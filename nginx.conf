server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        default_type text/plain;
        return 200 'ok';
    }

    location = /privacy  { return 301 /privacy.html; }
    location = /privacy/ { return 301 /privacy.html; }
    location = /support  { return 301 /support.html; }
    location = /support/ { return 301 /support.html; }
    location = /terms    { return 301 /terms.html; }
    location = /terms/   { return 301 /terms.html; }

    location / {
        try_files $uri $uri/ =404;
    }
}
